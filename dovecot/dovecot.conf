# Dovecot wird hier NUR als SASL-Auth-Server fuer Postfix betrieben.
# Es gibt keine Mailboxen, kein IMAP, kein POP3.

protocols =
listen = *
base_dir = /var/run/dovecot/

disable_plaintext_auth = no
auth_mechanisms = plain login

passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

# Keine echten Mailboxen noetig, daher ein statischer Dummy-Userdb-Eintrag
userdb {
  driver = static
  args = uid=8 gid=8 home=/tmp
}

service auth {
  # Unix-Socket, ueber den Postfix (anderer Container) authentifiziert
  unix_listener /var/spool/postfix-auth/auth {
    mode = 0666
  }
}

log_path = /dev/stderr
info_log_path = /dev/stdout
