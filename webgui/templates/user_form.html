{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">
          {% if user %}Benutzer bearbeiten: {{ user.username }}{% else %}Neuer Benutzer{% endif %}
        </h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Benutzername</label>
            {% if user %}
              <input type="text" class="form-control" value="{{ user.username }}" disabled>
            {% else %}
              <input type="text" name="username" class="form-control" required autofocus>
            {% endif %}
          </div>
          <div class="mb-3">
            <label class="form-label">
              Passwort {% if user %}(leer lassen, um es unveraendert zu lassen){% endif %}
            </label>
            <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
          </div>
          <div class="form-check mb-3">
            <input type="checkbox" name="active" class="form-check-input" id="active"
                   {% if not user or user.active %}checked{% endif %}>
            <label class="form-check-label" for="active">Aktiv (darf ueber das Relay mailen)</label>
          </div>
          <button type="submit" class="btn btn-primary">Speichern</button>
          <a href="{{ url_for('users_list') }}" class="btn btn-link">Abbrechen</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
