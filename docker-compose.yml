services:
  mysql:
    image: mariadb:11
    container_name: C7CU-Hermes-Reloaded_DB
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - mysql_data:/var/lib/mysql
      # Das gesamte Init-Verzeichnis mounten: Datei-Bind-Mounts koennen unter
      # Docker Desktop als Verzeichnis aufgeloest werden. MariaDB versucht dann
      # ein Verzeichnis als SQL-Eingabe zu lesen ("stdin").
      - ./mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping --host=localhost --user=root --password=\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - smtp_internal

  dovecot:
    build: ./dovecot
    container_name: C7CU-Hermes-Reloaded_dovecot
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - dovecot_auth:/var/spool/postfix-auth
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/spool/postfix-auth/auth"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - smtp_internal

  postfix:
    build: ./postfix
    container_name: C7CU-Hermes-Reloaded_postfix
    restart: unless-stopped
    depends_on:
      dovecot:
        condition: service_healthy
    ports:
      # klassischer SMTP-Port UND Submission-Port, beide mit Auth-Pflicht
      - "${SMTP_PORT:-25}:25"
      - "${SUBMISSION_PORT:-587}:587"
    environment:
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      TZ: ${TZ:-Europe/Berlin}
      # Optional; ohne Wert wird relay.<MAIL_DOMAIN> verwendet.
      POSTFIX_FQDN: ${POSTFIX_FQDN:-}
      # Nur Fallback/Erststart - die eigentliche, dauerhafte Konfiguration
      # erfolgt ueber die WebGUI (Menuepunkt "Smarthost") und liegt in MySQL.
      SMARTHOST: ${SMARTHOST}
      SMARTHOST_PORT: ${SMARTHOST_PORT}
      MYNETWORKS: ${MYNETWORKS}
    volumes:
      - dovecot_auth:/var/spool/postfix-auth
      - maillog:/var/log/postfix
      # Postfix schreibt Queue-Snapshots und verarbeitet Retry-Auftraege.
      - smarthost_config:/shared:rw
    networks:
      - smtp_internal

  webgui:
    build: ./webgui
    container_name: C7CU-Hermes-Reloaded_webgui
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Europe/Berlin}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      # Nur zur einmaligen Erstbefuellung der "settings"-Tabelle beim allerersten
      # Start. Danach ist die Datenbank (per WebGUI gepflegt) fuehrend.
      SMARTHOST: ${SMARTHOST}
      SMARTHOST_PORT: ${SMARTHOST_PORT}
      SMARTHOST_USER: ${SMARTHOST_USER}
      SMARTHOST_PASSWORD: ${SMARTHOST_PASSWORD}
    ports:
      - "${WEBGUI_PORT:-8080}:8080"
    volumes:
      - maillog:/var/log/postfix:ro
      - smarthost_config:/shared:rw
    networks:
      - smtp_internal

volumes:
  mysql_data:
  dovecot_auth:
  maillog:
  smarthost_config:

networks:
  smtp_internal:
    driver: bridge
